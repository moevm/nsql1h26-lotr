        - scripts
      summary: Script list
      operationId: listScripts
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
        - name: names
          in: query
          schema:
            type: string
        - $ref: "#/components/parameters/SortParam"
        - $ref: "#/components/parameters/OrderParam"
      responses:
        "200":
          description: Script list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      results:
                        type: array
                        items:
                          $ref: "#/components/schemas/ScriptListItem"
    post:
      tags:
        - scripts
      summary: Create a new script (admin)
      operationId: createScript
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - names
              properties:
                slug:
                  type: string
                names:
                  type: array
                  items:
                    type: string
                article:
                  $ref: "#/components/schemas/Article"
                categories:
                  type: array
                  items:
                    type: string
                relations:
                  type: object
      responses:
        "201":
          description: Script created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScriptPage"
        "400":
          description: Validation error
        "409":
          description: Slug is already taken
  /categories:
    get:
      tags:
        - categories
