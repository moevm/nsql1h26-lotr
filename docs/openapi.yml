openapi: 3.0.3
info:
  title: LotR Wiki API
  description: "API contract version v1.

    "
  version: 0.5.0
servers:
  - url: http://localhost:8000/api/v1
    description: Local dev server
tags:
  - name: auth
    description: Authentication and profile management
  - name: pages
    description: Generic page operations (characters, locations, etc.)
  - name: characters
    description: Character catalog
  - name: races
    description: Race catalog
  - name: locations
    description: Location catalog
  - name: events
    description: Event catalog
  - name: organizations
    description: Organization catalog
  - name: timelines
    description: Timeline catalog
  - name: items
    description: Item catalog
  - name: languages
    description: Language catalog
  - name: scripts
    description: Script catalog
  - name: categories
    description: Page categories
  - name: users
    description: User management (admin)
  - name: search
    description: Global search
  - name: analytics
    description: Analytics and graph queries
  - name: bulk
    description: Bulk import/export
  - name: meta
    description: Metadata (node and relation types)
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token obtained during login or registration.
  parameters:
    PageParam:
      name: page
      in: query
      description: Page number (starting from 1)
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSizeParam:
      name: page_size
      in: query
      description: Number of items per page
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    SortParam:
      name: sort
      in: query
      description: Sort field (allowed values depend on the endpoint)
      schema:
        type: string
    OrderParam:
      name: order
      in: query
      description: Sort direction
      schema:
        type: string
        enum:
          - asc
          - desc
        default: asc
  schemas:
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              description: Error code (for example, VALIDATION_ERROR)
            message:
              type: string
              description: Human-readable description
            fields:
              type: object
              nullable: true
              additionalProperties:
                type: array
                items:
                  type: string
              description: Field-level errors, if applicable
    PaginatedResponse:
      type: object
      required:
        - count
        - next
        - previous
        - results
      properties:
        count:
          type: integer
          description: Total number of items
        next:
          type: string
          nullable: true
          format: uri
          description: URL of the next page
        previous:
          type: string
          nullable: true
          format: uri
          description: URL of the previous page
        results:
          type: array
          items: {}
    User:
      type: object
      required:
        - username
        - email
        - role
        - createdAt
      properties:
        username:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum:
            - viewer
            - admin
        avatarUrl:
          type: string
          nullable: true
          format: uri
        createdAt:
          type: string
          format: date-time
    Tokens:
      type: object
      required:
        - access
        - refresh
      properties:
        access:
          type: string
          description: JWT access token
        refresh:
          type: string
          description: JWT refresh token
    RegisterRequest:
      type: object
      required:
        - username
        - email
        - password
      properties:
        username:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        password_confirm:
          type: string
          description: May be omitted if validation is performed on the frontend
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string
    RefreshRequest:
      type: object
      required:
        - refresh
      properties:
        refresh:
          type: string
    LogoutRequest:
      type: object
      required:
        - refresh
      properties:
        refresh:
          type: string
    MeResponse:
      allOf:
        - $ref: "#/components/schemas/User"
        - type: object
          properties:
            likedPages:
              type: array
              items:
                $ref: "#/components/schemas/PageSummary"
          required:
            - likedPages
    UpdateMeRequest:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
          format: email
        avatarUrl:
          type: string
          format: uri
        password:
          type: string
          minLength: 8
        password_current:
          type: string
          description: Required when changing the password
    PageSummary:
      type: object
      required:
        - slug
        - type
        - name
      properties:
        slug:
          type: string
        type:
          type: string
          description: Page type (character, race, location, ...)
        name:
          type: string
        imageUrl:
          type: string
          nullable: true
    Article:
      type: object
      properties:
        text:
          type: string
        imageUrl:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CategorySummary:
      type: object
      required:
        - slug
        - name
      properties:
        slug:
          type: string
        name:
          type: string
    RelationTarget:
      type: object
      required:
        - slug
        - type
        - name
      properties:
        slug:
          type: string
        type:
          type: string
        name:
          type: string
        imageUrl:
          type: string
          nullable: true
    RelationItem:
      type: object
      required:
        - target
        - properties
      properties:
        target:
          $ref: "#/components/schemas/RelationTarget"
        properties:
          type: object
          additionalProperties: true
          description: |
            Edge properties. See GET /meta/relation-types/ for allowed fields per relation type.
            Example for MEMBER_OF: { "role": "string", "fromDate": "string", "toDate": "string" }
    Relations:
      type: object
      properties:
        outgoing:
          type: object
          additionalProperties:
            type: array
            items:
              $ref: "#/components/schemas/RelationItem"
          description: Outgoing relations grouped by relation type
        incoming:
          type: object
          additionalProperties:
            type: array
            items:
              type: object
              required:
                - from
                - properties
              properties:
                from:
                  $ref: "#/components/schemas/RelationTarget"
                properties:
                  type: object
                  additionalProperties: true
          description: Incoming relations grouped by relation type
    CharacterAttributes:
      type: object
      properties:
        titles:
          type: array
          items:
            type: string
        gender:
          type: string
          enum:
            - male
            - female
            - unknown
        birthDate:
          type: string
          nullable: true
        deathDate:
          type: string
          nullable: true
        hair:
          type: string
          nullable: true
        eyes:
          type: string
          nullable: true
        height:
          type: string
          nullable: true
        weapon:
          type: string
          nullable: true
        clothing:
          type: string
          nullable: true
        notableFor:
          type: string
          nullable: true
      description: Character page-specific attributes.
    RaceAttributes:
      type: object
      properties:
        lifespan:
          type: string
          nullable: true
        avgHeight:
          type: string
          nullable: true
        hair:
          type: string
          nullable: true
        eyes:
          type: string
          nullable: true
        skin:
          type: string
          nullable: true
        weaponry:
          type: string
          nullable: true
        clothing:
          type: string
          nullable: true
        distinctions:
          type: string
          nullable: true
      description: Race page-specific attributes.
    LocationAttributes:
      type: object
      properties:
        locationType:
          type: string
          nullable: true
        population:
          type: string
          nullable: true
        creationDate:
          type: string
          nullable: true
        destructionDate:
          type: string
          nullable: true
        notableFor:
          type: string
          nullable: true
      description: Location page-specific attributes.
    EventAttributes:
      type: object
      properties:
        eventType:
          type: string
          nullable: true
        startDate:
          type: string
          nullable: true
        endDate:
          type: string
          nullable: true
        casualties:
          type: string
          nullable: true
        notableFor:
          type: string
          nullable: true
      description: Event page-specific attributes.
    OrganizationAttributes:
      type: object
      properties:
        organizationType:
          type: string
          nullable: true
        foundedDate:
          type: string
          nullable: true
        dissolvedDate:
          type: string
          nullable: true
        purpose:
          type: string
          nullable: true
        weaponry:
          type: string
          nullable: true
        clothing:
          type: string
          nullable: true
        notableFor:
          type: string
          nullable: true
      description: Organization page-specific attributes.
    TimelineAttributes:
      type: object
      properties:
        abbreviation:
          type: string
        startDate:
          type: string
          nullable: true
        endDate:
          type: string
          nullable: true
      description: Timeline page-specific attributes.
    ItemAttributes:
      type: object
      properties:
        itemType:
          type: string
          nullable: true
        material:
          type: string
          nullable: true
        notableFor:
          type: string
          nullable: true
      description: Item page-specific attributes.
    LanguageAttributes:
      type: object
      properties:
        family:
          type: string
          nullable: true
      description: Language page-specific attributes.
    ScriptAttributes:
      type: object
      properties: {}
      description: Script page-specific attributes.
    PageBase:
      type: object
      required:
        - slug
        - type
        - names
        - article
        - relations
        - categories
        - likesCount
        - commentsCount
        - isLiked
      properties:
        slug:
          type: string
        type:
          type: string
        names:
          type: array
          items:
            type: string
        article:
          $ref: "#/components/schemas/Article"
        relations:
          $ref: "#/components/schemas/Relations"
        categories:
          type: array
          items:
            $ref: "#/components/schemas/CategorySummary"
        likesCount:
          type: integer
        isLiked:
          type: boolean
          nullable: true
          description: null for unauthenticated users
        commentsCount:
          type: integer
    CharacterPage:
      allOf:
        - $ref: "#/components/schemas/PageBase"
        - type: object
          required:
            - attributes
          properties:
            type:
              type: string
              enum:
                - character
            attributes:
              $ref: "#/components/schemas/CharacterAttributes"
      description: Complete character page.
    RacePage:
      allOf:
        - $ref: "#/components/schemas/PageBase"
        - type: object
          required:
            - attributes
          properties:
            type:
              type: string
              enum:
                - race
            attributes:
              $ref: "#/components/schemas/RaceAttributes"
      description: Complete race page.
    LocationPage:
      allOf:
        - $ref: "#/components/schemas/PageBase"
        - type: object
          required:
            - attributes
          properties:
            type:
              type: string
              enum:
                - location
            attributes:
              $ref: "#/components/schemas/LocationAttributes"
      description: Complete location page.
    EventPage:
      allOf:
        - $ref: "#/components/schemas/PageBase"
        - type: object
          required:
            - attributes
          properties:
            type:
              type: string
              enum:
                - event
            attributes:
              $ref: "#/components/schemas/EventAttributes"
      description: Complete event page.
    OrganizationPage:
      allOf:
        - $ref: "#/components/schemas/PageBase"
        - type: object
          required:
            - attributes
          properties:
            type:
              type: string
              enum:
                - organization
            attributes:
              $ref: "#/components/schemas/OrganizationAttributes"
      description: Complete organization page.
    TimelinePage:
      allOf:
        - $ref: "#/components/schemas/PageBase"
        - type: object
          required:
            - attributes
          properties:
            type:
              type: string
              enum:
                - timeline
            attributes:
              $ref: "#/components/schemas/TimelineAttributes"
      description: Complete timeline page.
    ItemPage:
      allOf:
        - $ref: "#/components/schemas/PageBase"
        - type: object
          required:
            - attributes
          properties:
            type:
              type: string
              enum:
                - item
            attributes:
              $ref: "#/components/schemas/ItemAttributes"
      description: Complete item page.
    LanguagePage:
      allOf:
        - $ref: "#/components/schemas/PageBase"
        - type: object
          required:
            - attributes
          properties:
            type:
              type: string
              enum:
                - language
            attributes:
              $ref: "#/components/schemas/LanguageAttributes"
      description: Complete language page.
    ScriptPage:
      allOf:
        - $ref: "#/components/schemas/PageBase"
        - type: object
          required:
            - attributes
          properties:
            type:
              type: string
              enum:
                - script
            attributes:
              $ref: "#/components/schemas/ScriptAttributes"
      description: Complete script page.
    PageUpdateRequest:
      type: object
      properties:
        names:
          type: array
          items:
            type: string
        attributes:
          type: object
          description: Type-specific attributes
        article:
          type: object
          properties:
            text:
              type: string
            imageUrl:
              type: string
        categories:
          type: array
          items:
            type: string
            description: Category slug
        relations:
          type: object
          properties:
            outgoing:
              type: object
              additionalProperties:
                type: array
                items:
                  type: object
                  required:
                    - slug
                  properties:
                    slug:
                      type: string
                    properties:
                      type: object
                      additionalProperties: true
                      description: |
                        Arbitrary edge properties. See /meta/relation-types/
                        for allowed fields per relation type.
              description: |
                Outgoing relations from the page being updated.
                Key: relation type; Value: array of target objects.
            incoming:
              type: object
              additionalProperties:
                type: array
                items:
                  type: object
                  required:
                    - slug
                  properties:
                    slug:
                      type: string
                    properties:
                      type: object
                      additionalProperties: true
              description: |
                Incoming relations to the page being updated (i.e., edges from other pages).
                Key: relation type; Value: array of source objects.
          description: |
            Replacement for relations. Providing a key under `outgoing` or `incoming` replaces
            *all* edges of that type and direction. An empty array deletes them. Omitting a
            key leaves that group unchanged.
    CharacterListItem:
      allOf:
        - $ref: "#/components/schemas/PageSummary"
        - type: object
          properties:
            type:
              type: string
              enum:
                - character
            notableFor:
              type: string
              nullable: true
            gender:
              type: string
            birthDate:
              type: string
              nullable: true
            race:
              $ref: "#/components/schemas/PageSummary"
      description: Character catalog list item.
    RaceListItem:
      allOf:
        - $ref: "#/components/schemas/PageSummary"
        - type: object
          properties:
            type:
              type: string
              enum:
                - race
            distinctions:
              type: string
              nullable: true
            lifespan:
              type: string
              nullable: true
            avgHeight:
              type: string
              nullable: true
      description: Race catalog list item.
    LocationListItem:
      allOf:
        - $ref: "#/components/schemas/PageSummary"
        - type: object
          properties:
            type:
              type: string
              enum:
                - location
            locationType:
              type: string
              nullable: true
            notableFor:
              type: string
              nullable: true
            creationDate:
              type: string
              nullable: true
      description: Location catalog list item.
    EventListItem:
      allOf:
        - $ref: "#/components/schemas/PageSummary"
        - type: object
          properties:
            type:
              type: string
              enum:
                - event
            eventType:
              type: string
              nullable: true
            startDate:
              type: string
              nullable: true
            endDate:
              type: string
              nullable: true
      description: Event catalog list item.
    OrganizationListItem:
      allOf:
        - $ref: "#/components/schemas/PageSummary"
        - type: object
          properties:
            type:
              type: string
              enum:
                - organization
            organizationType:
              type: string
              nullable: true
            foundedDate:
              type: string
              nullable: true
            purpose:
              type: string
              nullable: true
      description: Organization catalog list item.
    TimelineListItem:
      allOf:
        - $ref: "#/components/schemas/PageSummary"
        - type: object
          properties:
            type:
              type: string
              enum:
                - timeline
            abbreviation:
              type: string
            startDate:
              type: string
              nullable: true
            endDate:
              type: string
              nullable: true
      description: Timeline catalog list item.
    ItemListItem:
      allOf:
        - $ref: "#/components/schemas/PageSummary"
        - type: object
          properties:
            type:
              type: string
              enum:
                - item
            itemType:
              type: string
              nullable: true
            material:
              type: string
              nullable: true
            notableFor:
              type: string
              nullable: true
      description: Item catalog list item.
    LanguageListItem:
      allOf:
        - $ref: "#/components/schemas/PageSummary"
        - type: object
          properties:
            type:
              type: string
              enum:
                - language
            family:
              type: string
              nullable: true
      description: Language catalog list item.
    ScriptListItem:
      allOf:
        - $ref: "#/components/schemas/PageSummary"
        - type: object
          properties:
            type:
              type: string
              enum:
                - script
      description: Script catalog list item.
    Comment:
      type: object
      required:
        - id
        - text
        - author
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        text:
          type: string
        author:
          type: object
          properties:
            username:
              type: string
            avatarUrl:
              type: string
              nullable: true
        createdAt:
          type: string
          format: date-time
    CommentRequest:
      type: object
      required:
        - text
      properties:
        text:
          type: string
          minLength: 1
    Category:
      type: object
      required:
        - slug
        - name
      properties:
        slug:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        parentSlug:
          type: string
          nullable: true
        childCount:
          type: integer
        pageCount:
          type: integer
    CategoryDetail:
      allOf:
        - $ref: "#/components/schemas/Category"
        - type: object
          properties:
            parent:
              type: object
              nullable: true
              properties:
                slug:
                  type: string
                name:
                  type: string
            children:
              type: array
              items:
                type: object
                properties:
                  slug:
                    type: string
                  name:
                    type: string
                  pageCount:
                    type: integer
            pages:
              allOf:
                - $ref: "#/components/schemas/PaginatedResponse"
                - type: object
                  properties:
                    results:
                      type: array
                      items:
                        $ref: "#/components/schemas/PageSummary"
          required:
            - parent
            - children
            - pages
    CategoryCreateRequest:
      type: object
      required:
        - name
      properties:
        slug:
          type: string
        name:
          type: string
        description:
          type: string
        parentSlug:
          type: string
    CategoryUpdateRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        parentSlug:
          type: string
          nullable: true
    AdminUser:
      allOf:
        - $ref: "#/components/schemas/User"
        - type: object
          properties:
            email:
              type: string
            role:
              type: string
              enum:
                - viewer
                - admin
    PublicUserProfile:
      type: object
      required:
        - username
        - createdAt
      properties:
        username:
          type: string
        avatarUrl:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        commentsCount:
          type: integer
        likedPages:
          type: array
          items:
            $ref: "#/components/schemas/PageSummary"
    UserRoleUpdateRequest:
      type: object
      required:
        - role
      properties:
        role:
          type: string
          enum:
            - viewer
            - admin
    SearchResultItem:
      type: object
      required:
        - slug
        - type
        - name
      properties:
        slug:
          type: string
        type:
          type: string
        name:
          type: string
        imageUrl:
          type: string
          nullable: true
    GlobalStats:
      type: object
      properties:
        counts:
          type: object
          properties:
            total:
              type: integer
            characters:
              type: integer
            races:
              type: integer
            locations:
              type: integer
            events:
              type: integer
            organizations:
              type: integer
            timelines:
              type: integer
            items:
              type: integer
            languages:
              type: integer
            scripts:
              type: integer
            articles:
              type: integer
        charactersByRace:
          type: array
          items:
            type: object
            properties:
              slug:
                type: string
              name:
                type: string
              count:
                type: integer
        charactersBySide:
          type: array
          items:
            type: object
            properties:
              side:
                type: string
              count:
                type: integer
        topConnected:
          type: object
          properties:
            characters:
              type: array
              items:
                $ref: "#/components/schemas/TopConnectedItem"
            locations:
              type: array
              items:
                $ref: "#/components/schemas/TopConnectedItem"
            events:
              type: array
              items:
                $ref: "#/components/schemas/TopConnectedItem"
            organizations:
              type: array
              items:
                $ref: "#/components/schemas/TopConnectedItem"
            items:
              type: array
              items:
                $ref: "#/components/schemas/TopConnectedItem"
    TopConnectedItem:
      type: object
      properties:
        slug:
          type: string
        name:
          type: string
        connectionsCount:
          type: integer
    NeighborsResponse:
      type: object
      properties:
        root:
          $ref: "#/components/schemas/PageSummary"
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/PageSummary"
        edges:
          type: array
          items:
            type: object
            properties:
              from:
                type: string
              to:
                type: string
              type:
                type: string
        stats:
          type: object
          properties:
            totalNeighbors:
              type: integer
            byType:
              type: object
              additionalProperties:
                type: integer
            byRelation:
              type: object
              additionalProperties:
                type: integer
    ShortestPathResponse:
      type: object
      properties:
        found:
          type: boolean
        length:
          type: integer
          nullable: true
        from:
          $ref: "#/components/schemas/PageSummary"
        to:
          $ref: "#/components/schemas/PageSummary"
        path:
          type: array
          items:
            type: object
            properties:
              node:
                $ref: "#/components/schemas/PageSummary"
              edgeToNext:
                type: object
                nullable: true
                properties:
                  type:
                    type: string
                  label:
                    type: string
    CustomAnalyticsData:
      type: object
      properties:
        entityType:
          type: string
        xAttr:
          type: string
        yAttr:
          type: string
        agg:
          type: string
          enum:
            - count
          description: Aggregation function. Current contract supports count only.
        data:
          type: array
          items:
            type: object
            properties:
              x:
                type: string
              y:
                type: string
              value:
                type: integer
    BulkImportResponse:
      type: object
      properties:
        imported:
          type: object
          additionalProperties:
            type: integer
        skipped:
          type: integer
        errors:
          type: array
          items:
            type: object
            properties:
              slug:
                type: string
              reason:
                type: string
